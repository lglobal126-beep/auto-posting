services:
  - type: web
    name: influencer-auto-post-backend
    env: python
    rootDir: backend
    buildCommand: apt-get install -y fonts-noto-cjk 2>/dev/null || true && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: LLM_API_URL
        sync: false
      - key: LLM_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false

